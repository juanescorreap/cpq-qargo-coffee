# nixpacks.toml
# Python, Playwright y Chromium para Railway.
#
# Creamos el virtualenv explícitamente en phases.install para evitar
# depender de $NIXPACKS_PATH (variable interna de nixpacks que genera
# una advertencia "undefined" en algunos buildpacks y deja pip fuera del
# PATH durante las etapas de build).  Todos los binarios se referencian
# con ruta absoluta /opt/venv/bin/* para que no importe el PATH.

[phases.setup]
nixPkgs = [
  "python311",
  "nodejs-18_x",
  "chromium"
]
nixLibs = [
  "glib",
  "nss",
  "nspr",
  "atk",
  "at-spi2-atk",
  "cups",
  "dbus",
  "expat",
  "libdrm",
  "xorg.libX11",
  "xorg.libxcb",
  "xorg.libXcomposite",
  "xorg.libXdamage",
  "xorg.libXext",
  "xorg.libXfixes",
  "xorg.libXrandr",
  "mesa",
  "pango",
  "cairo",
  "alsa-lib",
  "gtk3"
]

[phases.install]
cmds = [
  "python3 -m venv /opt/venv",
  "/opt/venv/bin/pip install --upgrade pip",
  "/opt/venv/bin/pip install -r requirements.txt",
  "/opt/venv/bin/playwright install chromium",
  "/opt/venv/bin/playwright install-deps chromium"
]

[start]
cmd = "/opt/venv/bin/uvicorn backend.main:app --host 0.0.0.0 --port $PORT"
