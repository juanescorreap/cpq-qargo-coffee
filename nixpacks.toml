# nixpacks.toml
# Configuración de build para Railway con soporte de Playwright/Chromium.
# Las X11 libs deben referenciarse como xorg.<name> (no existen en el top level
# de nixpkgs). libgbm es parte de mesa, no un paquete independiente.

[phases.setup]
nixPkgs = [
  "python311",
  "nodejs-18_x",
  "playwright-driver",
  "chromium"
]
nixLibs = [
  "glib",
  "nss",
  "nspr",
  "atk",
  "at-spi2-atk",
  "cups",
  "dbus",
  "expat",
  "libdrm",
  "xorg.libX11",
  "xorg.libxcb",
  "xorg.libXcomposite",
  "xorg.libXdamage",
  "xorg.libXext",
  "xorg.libXfixes",
  "xorg.libXrandr",
  "mesa",
  "pango",
  "cairo",
  "alsa-lib",
  "gtk3"
]

[phases.install]
cmds = [
  "pip install -r requirements.txt",
  "playwright install chromium",
  "playwright install-deps chromium"
]

[start]
cmd = "uvicorn backend.main:app --host 0.0.0.0 --port $PORT"
