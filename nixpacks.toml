# nixpacks.toml
# Python, Playwright and Chromium for Railway.
#
# We create the virtualenv explicitly in phases.install to avoid
# depending on $NIXPACKS_PATH (an internal nixpacks variable that generates
# an "undefined" warning in some buildpacks and leaves pip outside the
# PATH during build stages). All binaries are referenced with the
# absolute path /opt/venv/bin/* so that PATH does not matter.

[phases.setup]
nixPkgs = [
  "python311",
  "nodejs-18_x",
  "chromium"
]
nixLibs = [
  "glib",
  "nss",
  "nspr",
  "atk",
  "at-spi2-atk",
  "cups",
  "dbus",
  "expat",
  "libdrm",
  "xorg.libX11",
  "xorg.libxcb",
  "xorg.libXcomposite",
  "xorg.libXdamage",
  "xorg.libXext",
  "xorg.libXfixes",
  "xorg.libXrandr",
  "mesa",
  "pango",
  "cairo",
  "alsa-lib",
  "gtk3",
  "stdenv.cc.cc.lib"
]

[phases.install]
cmds = [
  "python3 -m venv /opt/venv",
  "/opt/venv/bin/pip install --upgrade pip",
  "/opt/venv/bin/pip install -r requirements.txt",
  "/opt/venv/bin/playwright install chromium"
]

[start]
cmd = "/opt/venv/bin/uvicorn backend.main:app --host 0.0.0.0 --port $PORT"
