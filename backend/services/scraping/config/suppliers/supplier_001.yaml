# ============================================
# SCRAPER CONFIGURATION - SUPPLIER 001
# ============================================
# Template for a retail / wholesale-type supplier.
#
# Key differences compared to competitors:
#   - required_fields includes 'product_unit' (critical for calculating cost/portion)
#   - More conservative rate_limiting (suppliers aggressively block bots)
#   - Additional selectors: minimum_order_quantity, bulk_discount
#   - search.query_param typically 'keyword' or 'search' (not 'q')
#
# To update selectors:
#   1. Open the supplier's site in Chrome
#   2. Search for a supply item (e.g.: "green coffee 500g")
#   3. Inspect name, price, packaging unit
#   4. Right-click node → Copy → Copy selector
#   5. Paste below and test:
#        python -m backend.services.scraping.tests.test_scraper supplier_001

# ============================================
# IDENTIFICATION
# ============================================
scraper_id: "supplier_001"
business_name: "Retail Supplier A"
business_type: "supplier"    # 'competitor' | 'supplier'
scraper_type: "retail"       # 'restaurant' | 'retail' | 'marketplace' | 'custom'
enabled: true

# ============================================
# BASE URL
# ============================================
base_url: "https://ejemplo-proveedor.com"

# ============================================
# BROWSER
# ============================================
browser:
  headless: true
  timeout_ms: 30000
  viewport_width: 1280
  viewport_height: 800
  user_agent: >-
    Mozilla/5.0 (Windows NT 10.0; Win64; x64)
    AppleWebKit/537.36 (KHTML, like Gecko)
    Chrome/120.0.0.0 Safari/537.36
  extra_headers: {}

# ============================================
# CSS/XPATH SELECTORS
# ============================================
selectors:

  # ------ Individual product page ------

  product_name:
    selector: ".item-name"
    type: "css"

  product_price:
    selector: ".bulk-price"
    type: "css"

  product_unit:
    selector: ".package-size"
    type: "css"
    # Example expected values: "Bag 500g", "Box x12 units", "1 Kg"

  product_category:
    selector: ".product-breadcrumb .category"
    type: "css"
    optional: true

  product_description:
    selector: ".item-description"
    type: "css"
    optional: true

  product_image:
    selector: ".item-photo img"
    type: "css"
    attribute: "src"
    optional: true

  # ------ Supplier-specific fields ------

  minimum_order_quantity:
    selector: ".min-order"
    type: "css"
    optional: true
    # E.g.: "Minimum order: 6 units"

  bulk_discount:
    selector: ".bulk-discount-badge"
    type: "css"
    optional: true
    # E.g.: "10% off buying +10 units"

  # ------ Search / listing page ------

  search_results:
    selector: ".item-card"
    type: "css"
    multiple: true

  result_name:
    selector: ".item-title"
    type: "css"

  result_price:
    selector: ".item-price"
    type: "css"

  result_link:
    selector: "a.item-link"
    type: "css"
    attribute: "href"

  result_image:
    selector: ".item-card img"
    type: "css"
    attribute: "src"
    optional: true

  # ------ Supplier metadata (all optional) ------

  metadata:
    minimum_order_quantity:
      selector: ".min-order"
      type: "css"
      optional: true

    bulk_discount:
      selector: ".bulk-discount-badge"
      type: "css"
      optional: true

    sku:
      selector: ".item-sku"
      type: "css"
      optional: true

    stock_status:
      selector: ".stock-badge"
      type: "css"
      optional: true

# ============================================
# NAVIGATION
# ============================================
navigation:

  search:
    path: "/products/search"
    method: "GET"
    query_param: "keyword"
    # Resulting URL: https://ejemplo-proveedor.com/products/search?keyword=cafe
    #
    # Alternative path_template (uncomment if applicable):
    # path_template: "/products/{query}"

  category:
    path: "/categories"
    path_template: "/categories/{category}"
    # Resulting URL: https://ejemplo-proveedor.com/categories/green-coffee

  product:
    path: "/product"
    path_template: "/product/{product_id}"

  pagination:
    type: "query_param"   # 'query_param' | 'path' | 'offset'
    param: "page"
    start: 1
    max_pages: 3          # More conservative: suppliers have large catalogs
    # Alternative offset (uncomment if site uses ?offset=0&limit=20):
    # type: "offset"
    # param: "offset"
    # offset_step: 20
    # max_pages: 5

  timeouts:
    navigation_ms: 30000
    retry_backoff_ms: 3000   # More time between retries for suppliers

# ============================================
# RATE LIMITING
# ============================================
# Suppliers often have aggressive WAF/Cloudflare protection.
# Be more conservative than with competitors.
rate_limiting:
  enabled: true
  delay_ms: 2000                  # 2s between requests (vs 1.5s for competitors)
  max_requests_per_minute: 15     # Lower than the default
  max_requests_per_hour: 200
  backoff_strategy: "exponential"
  max_backoff_ms: 120000          # 2 min maximum (double that of competitors)
  bucket_capacity: 3              # Small burst
  bucket_refill_rate: 0.25        # ~15 rpm sustained

# ============================================
# VALIDATION
# ============================================
# product_unit is REQUIRED for suppliers:
# without the packaging unit, cost per portion cannot be calculated.
required_fields:
  - "product_name"
  - "product_price"
  - "product_unit"

# ============================================
# FIELDS IGNORED BY THE ENGINE (documentation)
# ============================================
error_handling:
  retry_attempts: 3
  retry_delay_ms: 3000
  ignore_ssl_errors: false

transformations:
  price:
    decimal_separator: ","   # Colombian format: 12.500,00
    remove_symbols: ["$", "COP"]

  unit:
    # Packaging unit normalization for suppliers
    mappings:
      "kg": "Kg"
      "kilo": "Kg"
      "kilogramo": "Kg"
      "gr": "g"
      "gramo": "g"
      "lt": "L"
      "lts": "L"
      "litro": "L"
      "ml": "ml"
      "mililitro": "ml"
      "und": "unit"
      "unidad": "unit"
      "caja": "box"
      "bolsa": "bag"
      "saco": "sack"

# ============================================
# METADATA
# ============================================
metadata:
  created_at: "2025-05-20"
  last_updated: "2025-05-20"
  version: "1.0"
  author: "CPQ System"
  currency: "COP"
  notes: |
    Retail/wholesale supplier template.

    PENDING: Update selectors by inspecting the real site.

    Common suppliers to implement:
      - Makro Colombia
      - Alkosto / Ktronix
      - Éxito / Carulla (home/kitchen section)
      - Pricesmart
      - Local distributors with an online store

    Steps:
      1. Search for the supply item on the supplier's site
      2. Inspect: name, price, packaging unit
      3. Update selectors in the 'selectors' section
      4. Test: python -m backend.services.scraping.tests.test_scraper supplier_001
  contact: "equipo-data@empresa.com"
