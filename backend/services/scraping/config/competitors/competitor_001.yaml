# ============================================
# SCRAPER CONFIGURATION - COMPETITOR 001
# ============================================
# Example template for a cafeteria/restaurant-type competitor scraper.
#
# IMPORTANT: The CSS selectors are PLACEHOLDERS.
# Update them by inspecting the real site:
#   1. Open the site in Chrome
#   2. Right-click on the element → Inspect
#   3. In the Elements panel, right-click on the node → Copy → Copy selector
#   4. Paste here and test with:
#        python -m backend.services.scraping.tests.test_scraper competitor_001
#
# Fields the system reads directly (must match ScraperConfigSchema):
#   scraper_id, business_name, business_type, scraper_type, base_url,
#   selectors, navigation, browser, rate_limiting, required_fields, metadata
#
# Fields ignored by the system (documentation / future use):
#   regions, error_handling, transformations

# ============================================
# IDENTIFICATION
# ============================================
scraper_id: "competitor_001"
business_name: "Competitor Cafeteria A"
business_type: "competitor"   # 'competitor' | 'supplier'
scraper_type: "restaurant"    # 'restaurant' | 'retail' | 'marketplace' | 'custom'
enabled: true

# ============================================
# BASE URL
# ============================================
base_url: "https://ejemplo-competidor.com"

# Regions (ignored by the current engine — future documentation)
regions:
  - country: "CO"
    url: "https://ejemplo-competidor.com.co"
    currency: "COP"

# ============================================
# BROWSER
# ============================================
# Note: the 'viewport' field is expressed with viewport_width / viewport_height
# (flat fields) to match _BrowserSchema in config_loader.py.
browser:
  headless: true
  timeout_ms: 30000
  viewport_width: 1920
  viewport_height: 1080
  user_agent: >-
    Mozilla/5.0 (Windows NT 10.0; Win64; x64)
    AppleWebKit/537.36 (KHTML, like Gecko)
    Chrome/120.0.0.0 Safari/537.36
  extra_headers: {}

# ============================================
# CSS/XPATH SELECTORS
# ============================================
# Each value can be:
#   - short string:  ".class"             (CSS, no attribute, required)
#   - full dict:     see fields below
#
# Selector fields:
#   selector   (str)  — CSS or XPath expression
#   type       (str)  — 'css' (default) | 'xpath'
#   attribute  (str)  — if you want to extract an HTML attribute (e.g.: 'src', 'href')
#   optional   (bool) — true = does not raise SelectorError if missing (default: false)
#   multiple   (bool) — true = extracts list of elements (default: false)

selectors:

  # ------ Individual product page ------

  product_name:
    selector: ".product-title"
    type: "css"

  product_price:
    selector: ".price-value"
    type: "css"

  product_unit:
    selector: ".product-size"
    type: "css"
    optional: true

  product_category:
    selector: ".breadcrumb .category"
    type: "css"
    optional: true

  product_description:
    selector: ".product-description"
    type: "css"
    optional: true

  product_image:
    selector: ".product-image img"
    type: "css"
    attribute: "src"
    optional: true

  # ------ Search / listing page ------

  search_results:
    selector: ".product-card"
    type: "css"
    multiple: true          # extracts list of ElementHandle

  result_name:
    selector: ".card-title"
    type: "css"

  result_price:
    selector: ".card-price"
    type: "css"

  result_link:
    selector: "a.product-link"
    type: "css"
    attribute: "href"       # extract_from_element will use this attribute

  result_image:
    selector: ".card-image img"
    type: "css"
    attribute: "src"
    optional: true

  # ------ Additional metadata (all optional) ------
  # Accessed via selector_engine.extract_text(page, 'metadata.availability')

  metadata:
    availability:
      selector: ".availability-badge"
      type: "css"
      optional: true

    rating:
      selector: ".product-rating"
      type: "css"
      optional: true

    reviews_count:
      selector: ".reviews-count"
      type: "css"
      optional: true

# ============================================
# NAVIGATION
# ============================================
# Structure read by NavigationEngine:
#   search.path, search.method, search.query_param, search.path_template
#   category.path, category.path_template
#   product.path, product.path_template
#   pagination.type, pagination.param, pagination.start, pagination.max_pages
#   pagination.offset_step  (only for type='offset')
#   timeouts.navigation_ms, timeouts.retry_backoff_ms

navigation:

  search:
    path: "/search"
    method: "GET"
    query_param: "q"
    # Resulting URL: https://ejemplo-competidor.com/search?q=cappuccino
    #
    # Alternative with path_template (uncomment if applicable):
    # path_template: "/search/{query}"
    # Resulting URL: https://ejemplo-competidor.com/search/cappuccino

  category:
    path: "/menu"
    # path_template: "/menu/{category}"

  product:
    path: "/product"
    # path_template: "/product/{product_id}"

  pagination:
    type: "query_param"     # 'query_param' | 'path' | 'offset'
    param: "page"
    start: 1                # first page number
    max_pages: 5
    # For type='offset': offset_step: 20

  timeouts:
    navigation_ms: 30000
    retry_backoff_ms: 2000

# ============================================
# RATE LIMITING
# ============================================
rate_limiting:
  enabled: true
  delay_ms: 1500
  max_requests_per_minute: 20
  max_requests_per_hour: 300
  backoff_strategy: "exponential"   # 'fixed' | 'exponential'
  max_backoff_ms: 60000
  bucket_capacity: 5                # token bucket: maximum burst
  bucket_refill_rate: 0.33          # tokens/second (~20 rpm sustained)

# ============================================
# VALIDATION
# ============================================
# Fields that MUST be present in each scraped product.
# If any is missing, ConfigLoader rejects the config and scraper raises ValidationError.
required_fields:
  - "product_name"
  - "product_price"

# ============================================
# FIELDS IGNORED BY THE ENGINE (documentation)
# ============================================
# error_handling and transformations are not read by ConfigLoader/ScraperAdapter.
# Kept here as a reference for the operator.

error_handling:
  retry_attempts: 3
  retry_delay_ms: 2000
  ignore_ssl_errors: false
  screenshot_on_error: false

transformations:
  # PriceCleaner automatically detects the decimal separator.
  # If the site uses European/Colombian format 1.500,99 → decimal_separator: ','
  # If it uses English format 1,500.99                  → decimal_separator: '.'
  price:
    decimal_separator: ","
    remove_symbols: ["$", "COP"]

  unit:
    mappings:
      "oz": "oz"
      "onzas": "oz"
      "ml": "ml"
      "mililitros": "ml"
      "litro": "L"
      "L": "L"
      "grande": "L"
      "mediano": "M"
      "pequeño": "S"

# ============================================
# METADATA
# ============================================
metadata:
  created_at: "2025-05-20"
  last_updated: "2025-05-20"
  version: "1.0"
  author: "CPQ System"
  currency: "COP"
  notes: |
    Initial competitor scraper template for a cafeteria-type site.

    PENDING: Update CSS selectors by inspecting the real site.

    Steps:
      1. Open https://ejemplo-competidor.com in Chrome
      2. DevTools → Elements → inspect product name, price, product card
      3. Right-click node → Copy → Copy selector
      4. Paste in the 'selectors' section above
      5. Test: python -m backend.services.scraping.tests.test_scraper competitor_001
  contact: "equipo-data@empresa.com"
