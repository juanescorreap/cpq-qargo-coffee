# ============================================
# MASTER SCRAPER REGISTRY
# ============================================
# This file defines all scrapers available in the system.
#
# To add a new scraper:
#   1. Create a YAML file in competitors/ or suppliers/
#      (the filename without .yaml is the scraper_id)
#   2. Add an entry to the corresponding list below
#   3. The system will detect it on the next startup
#
# ConfigLoader loads this file as "registry.yaml".
# The canonical name is registry.yaml — scrapers_registry.yaml is an alias.

version: "1.0"
last_updated: "2025-05-20"

# ============================================
# Global configuration (reference / documentation)
# These values are NOT read directly by ConfigLoader.
# Each scraper YAML defines its own values in browser/rate_limiting.
# Keep here as the source of truth for new scrapers.
# ============================================
global_defaults:
  browser:
    headless: true
    timeout_ms: 30000
    viewport_width: 1280
    viewport_height: 800
    user_agent: >-
      Mozilla/5.0 (Windows NT 10.0; Win64; x64)
      AppleWebKit/537.36 (KHTML, like Gecko)
      Chrome/120.0.0.0 Safari/537.36
  rate_limiting:
    enabled: true
    delay_ms: 1500
    max_requests_per_minute: 20
    max_requests_per_hour: 300
    backoff_strategy: exponential
    max_backoff_ms: 60000
  retry_attempts: 3
  cache_ttl_seconds: 300
  max_concurrent_scrapers: 3   # reserved for future threading implementation

# ============================================
# Registered scrapers
# ============================================
# Fields per entry:
#   id          (str)  — must match the YAML filename without extension
#   name        (str)  — human-readable name (display only, not functional)
#   enabled     (bool) — overridden by the enabled field inside the YAML
#   priority    (int)  — execution order in batch (lower = first)
#   schedule    (str)  — suggested frequency: "daily" | "weekly" | "monthly"
#   notes       (str)  — operator comments / reason for disabling

scrapers:

  competitors:
    - id: "competitor_001"
      name: "Competitor Cafeteria A"
      enabled: true
      priority: 1
      schedule: "weekly"
      notes: "Example scraper — update selectors according to the real site"

    # Template for new entries:
    # - id: "competitor_002"
    #   name: "Competitor name"
    #   enabled: true
    #   priority: 2
    #   schedule: "weekly"
    #   notes: ""

  suppliers:
    - id: "supplier_001"
      name: "Retail Supplier A"
      enabled: true
      priority: 1
      schedule: "daily"
      notes: "Example scraper — update selectors according to the real site"

    # Template for new entries:
    # - id: "supplier_002"
    #   name: "Supplier name"
    #   enabled: true
    #   priority: 2
    #   schedule: "daily"
    #   notes: ""

# ============================================
# Batch execution groups
# ============================================
# Used by ScraperManager to run logical subsets.
# IDs must exist in the scrapers list above.

scraping_groups:

  daily_suppliers:
    description: "Daily supplier price update"
    scraper_ids:
      - "supplier_001"

  weekly_competitors:
    description: "Weekly competitor menu review"
    scraper_ids:
      - "competitor_001"

  monthly_full:
    description: "Full monthly scraping (all active scrapers)"
    scraper_ids:
      - "competitor_001"
      - "supplier_001"
