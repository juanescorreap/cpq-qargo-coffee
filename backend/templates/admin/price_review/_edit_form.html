{# Inline edit form row. Context: store_id, ing (dict), error (optional). #}
<tr id="pr-row-{{ ing.id }}" class="bg-amber-50/40">
  <td class="px-4 py-2.5 font-medium text-espresso align-top">
    {{ ing.name }}
    <p class="text-xs text-stone-400 font-normal mt-1">
      Last synced: Excel import (original load)
    </p>
    {% if error %}
    <p class="text-xs text-red-600 font-normal mt-1">{{ error }}</p>
    {% endif %}
  </td>
  <td class="px-4 py-2.5 align-top" colspan="3">
    <form id="pr-edit-{{ ing.id }}"
          hx-post="/admin/price-review/update"
          hx-target="#pr-row-{{ ing.id }}"
          hx-swap="outerHTML"
          hx-indicator="#page-spinner"
          class="flex flex-wrap items-center gap-2">
      <input type="hidden" name="ingredient_id" value="{{ ing.id }}">
      <input type="hidden" name="store_id" value="{{ store_id }}">
      <div class="relative">
        <span class="absolute left-2 top-1/2 -translate-y-1/2 text-stone-400 text-sm">$</span>
        <input type="number" name="purchase_price" step="0.01" min="0.01" required
               value="{{ "%.2f"|format(ing.purchase_price) }}"
               class="w-28 pl-5 pr-2 py-1.5 text-sm border border-stone-200 rounded-lg bg-white
                      focus:outline-none focus:ring-2 focus:ring-amber/40 focus:border-amber">
      </div>
      <input type="text" name="purchase_unit" required
             value="{{ ing.purchase_unit or '' }}"
             placeholder="Unit"
             class="w-40 px-2 py-1.5 text-sm border border-stone-200 rounded-lg bg-white
                    focus:outline-none focus:ring-2 focus:ring-amber/40 focus:border-amber">
    </form>
  </td>
  <td class="px-4 py-2.5 text-center align-top"></td>
  <td class="px-4 py-2.5 text-right whitespace-nowrap align-top">
    <button type="submit" form="pr-edit-{{ ing.id }}"
            class="px-2.5 py-1 rounded-lg text-xs font-semibold text-beige
                   bg-espresso hover:bg-espresso-light transition-colors">
      ✓ Confirm
    </button>
    <button type="button"
            hx-get="/admin/price-review/{{ store_id }}/row/{{ ing.id }}"
            hx-target="#pr-row-{{ ing.id }}"
            hx-swap="outerHTML"
            class="ml-1 px-2.5 py-1 rounded-lg text-xs font-medium text-stone-500
                   border border-stone-200 hover:bg-stone-50 transition-colors">
      ✗ Cancel
    </button>
  </td>
</tr>
