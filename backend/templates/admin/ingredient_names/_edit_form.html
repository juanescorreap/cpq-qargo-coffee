{# Inline rename form row. Context: ing (dict), error (optional). #}
<tr id="in-row-{{ ing.id }}" class="bg-amber-50/40">
  <td class="px-4 py-2.5 align-top" colspan="2">
    <form id="in-edit-{{ ing.id }}"
          hx-post="/admin/ingredient-names/update"
          hx-target="#in-row-{{ ing.id }}"
          hx-swap="outerHTML"
          hx-indicator="#page-spinner"
          class="flex flex-wrap items-center gap-2">
      <input type="hidden" name="ingredient_id" value="{{ ing.id }}">
      <input type="text" name="name" required maxlength="300"
             value="{{ ing.current_name }}"
             class="w-72 px-2 py-1.5 text-sm border border-stone-200 rounded-lg bg-white
                    focus:outline-none focus:ring-2 focus:ring-amber/40 focus:border-amber">
    </form>
    <p class="text-xs text-stone-400 mt-1">
      API name: {{ ing.api_name or '—' }}
    </p>
    {% if error %}
    <p class="text-xs text-red-600 mt-1">{{ error }}</p>
    {% endif %}
  </td>
  <td class="px-4 py-2.5 text-stone-600 align-top">{{ ing.category_name }}</td>
  <td class="px-4 py-2.5 align-top">
    {% if ing.flag_label %}
    <span class="px-2 py-0.5 rounded-full text-xs font-medium border {{ ing.flag_classes }}">
      {{ ing.flag_label }}
    </span>
    {% else %}
    <span class="text-stone-300">ok</span>
    {% endif %}
  </td>
  <td class="px-4 py-2.5 text-right whitespace-nowrap align-top">
    <button type="submit" form="in-edit-{{ ing.id }}"
            class="px-2.5 py-1 rounded-lg text-xs font-semibold text-beige
                   bg-espresso hover:bg-espresso-light transition-colors">
      ✓
    </button>
    <button type="button"
            hx-get="/admin/ingredient-names/row/{{ ing.id }}"
            hx-target="#in-row-{{ ing.id }}"
            hx-swap="outerHTML"
            hx-indicator="#page-spinner"
            class="ml-1 px-2.5 py-1 rounded-lg text-xs font-medium text-stone-500
                   border border-stone-200 hover:bg-stone-50 transition-colors">
      ✗
    </button>
  </td>
</tr>
