{# Read-only ingredient-name row. Context: ing (dict). #}
<tr id="in-row-{{ ing.id }}" class="hover:bg-stone-50 transition-colors">
  <td class="px-4 py-2.5 font-medium text-espresso">{{ ing.current_name }}</td>
  <td class="px-4 py-2.5 text-stone-500">{{ ing.api_name or '—' }}</td>
  <td class="px-4 py-2.5 text-stone-600">{{ ing.category_name }}</td>
  <td class="px-4 py-2.5">
    {% if ing.flag_label %}
    <span class="px-2 py-0.5 rounded-full text-xs font-medium border {{ ing.flag_classes }}">
      {{ ing.flag_label }}
    </span>
    {% else %}
    <span class="text-stone-300">ok</span>
    {% endif %}
  </td>
  <td class="px-4 py-2.5 text-right whitespace-nowrap">
    <button type="button"
            hx-get="/admin/ingredient-names/edit/{{ ing.id }}"
            hx-target="#in-row-{{ ing.id }}"
            hx-swap="outerHTML"
            hx-indicator="#page-spinner"
            class="px-2.5 py-1 rounded-lg text-xs font-semibold text-espresso
                   border border-stone-200 hover:bg-stone-50 transition-colors">
      Edit
    </button>
  </td>
</tr>
